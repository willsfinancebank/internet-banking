<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — Wills Finance Bank</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23C8102E'/%3E%3Cpath d='M50 18 L28 52 L40 52 L28 82 L72 82 L60 52 L72 52 L50 18Z' fill='%23FFB81C'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%23FFFFFF'/%3E%3Cpath d='M50 34 L44 48 L30 48 L42 58 L37 74 L50 64 L63 74 L58 58 L70 48 L56 48 L50 34Z' fill='%23C8102E'/%3E%3C/svg%3E" />

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
                   ROOT VARIABLES — Light & Dark Mode
                ============================================================ */
        :root {
            --wf-red: #C8102E;
            --wf-red-dark: #a00f24;
            --wf-gold: #FFB81C;
            --wf-gold-light: #FFD966;
            --wf-dark: #002856;
            --wf-dark-light: #003b7a;
            --wf-light: #f0f4f8;
            --wf-text: #1a1a1a;
            --wf-muted: #6b7a8f;
            --wf-shadow: 0 20px 60px rgba(0, 40, 86, 0.10);
            --wf-shadow-hover: 0 30px 80px rgba(0, 40, 86, 0.18);
            --wf-card-bg: #ffffff;
            --wf-body-bg: #f0f4f8;
            --wf-border: rgba(0, 0, 0, 0.04);
            --wf-input-bg: rgba(255, 255, 255, 0.6);
            --wf-header-bg: rgba(255, 255, 255, 0.85);
            --wf-nav-text: #1a1a1a;
            --wf-card-radius: 32px;
            --wf-transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-bs-theme="dark"] {
            --wf-dark: #0a1628;
            --wf-dark-light: #142a4a;
            --wf-light: #0f1a2e;
            --wf-text: #e8edf5;
            --wf-muted: #94a3b8;
            --wf-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            --wf-shadow-hover: 0 30px 80px rgba(0, 0, 0, 0.5);
            --wf-card-bg: #162033;
            --wf-body-bg: #0f1a2e;
            --wf-border: rgba(255, 255, 255, 0.06);
            --wf-input-bg: rgba(255, 255, 255, 0.05);
            --wf-header-bg: rgba(22, 32, 51, 0.92);
            --wf-nav-text: #e8edf5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--wf-body-bg);
            color: var(--wf-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.4s ease, color 0.4s ease;
            min-height: 100vh;
        }

        /* ============================================================
                   HEADER
                ============================================================ */
        #header {
            background: var(--wf-header-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--wf-border);
            transition: all var(--wf-transition);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 50;
            padding: 0 1.5rem;
        }
        #header.scrolled {
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.06);
        }

        .logo-premium {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            padding: 0.75rem 0;
        }
        .logo-premium .logo-mark {
            position: relative;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }
        .logo-premium .logo-mark .shield-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, var(--wf-red), var(--wf-red-dark));
            border-radius: 12px;
            transform: rotate(6deg);
            box-shadow: 0 4px 20px rgba(200, 16, 46, 0.3);
            transition: all var(--wf-transition);
        }
        .logo-premium:hover .logo-mark .shield-bg {
            transform: rotate(6deg) scale(1.06);
            box-shadow: 0 6px 30px rgba(200, 16, 46, 0.45);
        }
        .logo-premium .logo-mark .shield-inner {
            position: absolute;
            inset: 3px;
            background: var(--wf-dark);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid rgba(255, 184, 28, 0.12);
            transition: all var(--wf-transition);
        }
        .logo-premium:hover .logo-mark .shield-inner {
            border-color: rgba(255, 184, 28, 0.25);
        }
        .logo-premium .logo-mark .shield-inner i {
            font-size: 1.2rem;
            color: var(--wf-gold);
        }
        .logo-premium .logo-text-group {
            display: flex;
            flex-direction: column;
            line-height: 1.05;
        }
        .logo-premium .logo-line1 {
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            color: var(--wf-nav-text);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            transition: color var(--wf-transition);
        }
        .logo-premium .logo-line1 .highlight {
            color: var(--wf-red);
        }
        .logo-premium .logo-line1 .spacer {
            width: 4px;
            height: 4px;
            background: var(--wf-gold);
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
        }
        .logo-premium .logo-line2 {
            font-size: clamp(0.45rem, 1vw, 0.6rem);
            font-weight: 600;
            letter-spacing: 0.18em;
            color: var(--wf-muted);
            text-transform: uppercase;
            margin-top: -1px;
            transition: color var(--wf-transition);
        }
        .logo-premium .logo-line2 .gold-dot {
            color: var(--wf-gold);
        }
        .logo-premium .logo-divider {
            width: 1px;
            height: 28px;
            background: var(--wf-border);
            margin: 0 2px 0 4px;
            transition: background var(--wf-transition);
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--wf-border);
            color: var(--wf-nav-text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 1.1rem;
            margin-left: 0.5rem;
        }
        .theme-toggle:hover {
            background: var(--wf-red);
            color: #fff;
            transform: rotate(30deg);
        }

        /* ============================================================
                   BUTTONS
                ============================================================ */
        .btn-wf-red {
            background: linear-gradient(135deg, var(--wf-red), var(--wf-red-dark));
            color: #fff !important;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-wf-red:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(200, 16, 46, 0.40);
            color: #fff !important;
        }
        .btn-wf-gold {
            background: linear-gradient(135deg, var(--wf-gold), #e5a50f);
            color: var(--wf-dark) !important;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-wf-gold:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(255, 184, 28, 0.45);
            color: var(--wf-dark) !important;
        }
        .btn-outline-wf {
            border: 2px solid var(--wf-red);
            color: var(--wf-red) !important;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-outline-wf:hover {
            background: var(--wf-red);
            color: #fff !important;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(200, 16, 46, 0.25);
        }

        /* ============================================================
                   AUTH PAGE
                ============================================================ */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 1rem 2rem;
            background: var(--wf-body-bg);
            position: relative;
            overflow: hidden;
            transition: background var(--wf-transition);
        }
        .auth-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(200, 16, 46, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 184, 28, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }
        .auth-card {
            background: var(--wf-card-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: var(--wf-card-radius);
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            border: 1px solid var(--wf-border);
            box-shadow: var(--wf-shadow);
            position: relative;
            z-index: 1;
            transition: all var(--wf-transition);
        }
        .auth-card .auth-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }
        .auth-card .auth-logo .logo-mark {
            position: relative;
            width: 64px;
            height: 64px;
            flex-shrink: 0;
            margin: 0 auto;
        }
        .auth-card .auth-logo .logo-mark .shield-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, var(--wf-red), var(--wf-red-dark));
            border-radius: 18px;
            transform: rotate(8deg);
            box-shadow: 0 4px 24px rgba(200, 16, 46, 0.25);
        }
        .auth-card .auth-logo .logo-mark .shield-inner {
            position: absolute;
            inset: 4px;
            background: var(--wf-card-bg);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid rgba(200, 16, 46, 0.08);
            transition: background var(--wf-transition);
        }
        .auth-card .auth-logo .logo-mark .shield-inner i {
            font-size: 1.8rem;
            color: var(--wf-red);
        }
        .auth-card .auth-logo h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--wf-text);
            margin-top: 12px;
        }
        .auth-card .auth-logo h2 span {
            color: var(--wf-red);
        }
        .auth-card .auth-logo p {
            font-size: 0.85rem;
            color: var(--wf-muted);
            margin-top: 2px;
        }
        .auth-card .form-control {
            border-radius: 12px;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--wf-border);
            background: var(--wf-input-bg);
            font-size: 0.9rem;
            transition: all 0.3s ease;
            color: var(--wf-text);
        }
        .auth-card .form-control:focus {
            border-color: var(--wf-red);
            box-shadow: 0 0 0 4px rgba(200, 16, 46, 0.08);
            background: var(--wf-card-bg);
        }
        .auth-card .form-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--wf-text);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .auth-card .auth-link {
            color: var(--wf-red);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }
        .auth-card .auth-link:hover {
            color: var(--wf-red-dark);
            text-decoration: underline;
        }
        .auth-card .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--wf-muted);
            font-size: 0.75rem;
            margin: 1.5rem 0;
        }
        .auth-card .divider::before,
        .auth-card .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--wf-border);
        }
        .auth-card .social-btn {
            width: 100%;
            padding: 0.7rem;
            border-radius: 12px;
            border: 1.5px solid var(--wf-border);
            background: transparent;
            color: var(--wf-text);
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .auth-card .social-btn:hover {
            background: var(--wf-border);
            transform: translateY(-2px);
        }

        /* ============================================================
                   TOAST
                ============================================================ */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--wf-dark);
            color: #fff;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9998;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            max-width: 420px;
            width: 90%;
        }
        .toast-notification.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .toast-notification .toast-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 184, 28, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--wf-gold);
            font-size: 1rem;
            flex-shrink: 0;
        }
        .toast-notification .toast-content .toast-title {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .toast-notification .toast-content .toast-msg {
            font-size: 0.75rem;
            opacity: 0.6;
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }

        @media (max-width: 576px) {
            .auth-card {
                padding: 1.5rem 1rem;
            }
            .auth-card .auth-logo h2 {
                font-size: 1.2rem;
            }
            .auth-card .auth-logo .logo-mark {
                width: 48px;
                height: 48px;
            }
            .auth-card .auth-logo .logo-mark .shield-inner i {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    HEADER
    ============================================================ -->
    <header id="header">
        <div class="container-fluid d-flex align-items-center justify-content-between" style="max-width:1200px;margin:0 auto;">
            <a href="index.html" class="logo-premium">
                <span class="logo-mark">
                    <span class="shield-bg"></span>
                    <span class="shield-inner"><i class="fas fa-crown"></i></span>
                </span>
                <span class="logo-divider"></span>
                <span class="logo-text-group">
                    <span class="logo-line1">WILLS<span class="spacer"></span><span class="highlight">FINANCE</span></span>
                    <span class="logo-line2">BK <span class="gold-dot">•</span> EST. 1992</span>
                </span>
            </a>
            <div class="d-flex align-items-center gap-2">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <a href="signup.html" class="btn btn-wf-red px-4 py-2 text-sm rounded-full d-none d-sm-inline-flex align-items-center gap-2">
                    <i class="fas fa-user-plus"></i> Sign Up
                </a>
            </div>
        </div>
    </header>

    <!-- ============================================================
    LOGIN PAGE
    ============================================================ -->
    <section class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-mark">
                    <div class="shield-bg"></div>
                    <div class="shield-inner"><i class="fas fa-crown"></i></div>
                </div>
                <h2>WILLS <span>FINANCE</span> BK</h2>
                <p>Welcome back • Sign in to your account</p>
            </div>
            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control w-full" placeholder="john@example.com" required />
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-control w-full" placeholder="••••••••" required />
                </div>
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <label class="d-flex align-items-center gap-2 text-sm" style="color:var(--wf-muted);">
                        <input type="checkbox" checked /> Remember me
                    </label>
                    <a href="#" class="auth-link text-sm" onclick="event.preventDefault();showToast('Password Reset','Password reset link sent to your email.')">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-wf-red w-full py-3 text-sm font-semibold rounded-full">
                    Sign In <i class="fas fa-arrow-right ms-2"></i>
                </button>
                <div class="divider">or continue with</div>
                <div class="grid grid-cols-2 gap-3" style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                    <button type="button" class="social-btn" onclick="showToast('Google','Redirecting to Google...')">
                        <i class="fab fa-google" style="color:#ea4335;"></i> Google
                    </button>
                    <button type="button" class="social-btn" onclick="showToast('Apple','Redirecting to Apple...')">
                        <i class="fab fa-apple"></i> Apple
                    </button>
                </div>
                <p class="text-center text-sm mt-4" style="color:var(--wf-muted);">
                    Don't have an account? <a href="signup.html" class="auth-link">Sign Up</a>
                </p>
            </form>
        </div>
    </section>

    <!-- ============================================================
    TOAST
    ============================================================ -->
    <div class="toast-notification" id="toast">
        <div class="toast-icon"><i class="fas fa-check-circle"></i></div>
        <div class="toast-content">
            <div class="toast-title" id="toastTitle">Success</div>
            <div class="toast-msg" id="toastMsg">Action completed</div>
        </div>
    </div>

    <script>
        // ============================================================
        // DATABASE (localStorage)
        // ============================================================
        const DB = {
            get(key) { try { return JSON.parse(localStorage.getItem('wf_' + key)) || null; } catch { return null; } },
            set(key, val) { localStorage.setItem('wf_' + key, JSON.stringify(val)); },
            getUsers() { return this.get('users') || []; },
            setUsers(users) { this.set('users', users); },
            getSession() { return this.get('session') || null; },
            setSession(session) { this.set('session', session); },
            clearSession() { localStorage.removeItem('wf_session'); }
        };

        // Seed demo users if empty
        function seedUsers() {
            const users = DB.getUsers();
            if (users.length === 0) {
                DB.setUsers([{
                    id: 'user_1',
                    name: 'John Irwin',
                    email: 'johnirwin@gmail.com',
                    password: 'Killedward2#3',
                    balance: 57000000,
                    accounts: [
                        { type: 'checking', number: '4829', balance: 32000000, name: 'Primary Checking' },
                        { type: 'savings', number: '8731', balance: 25000000, name: 'Premium Savings' }
                    ],
                    cards: [
                        { type: 'Visa Platinum', number: '4111 1111 1111 1111', expiry: '12/28', limit: 50000,
                            balance: 12450, rewards: 2450 },
                        { type: 'Mastercard Elite', number: '5555 5555 5555 4444', expiry: '08/27', limit: 75000,
                            balance: 8900, rewards: 5100 }
                    ],
                    investments: { total: 12450000, stocks: 40, bonds: 30, realEstate: 15, cash: 15 },
                    createdAt: new Date().toISOString()
                }]);
            }
        }
        seedUsers();

        // ============================================================
        // DARK MODE
        // ============================================================
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;
        let darkMode = localStorage.getItem('wf-theme') === 'dark' ||
            (!localStorage.getItem('wf-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);

        function setTheme(dark) {
            darkMode = dark;
            html.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
            themeIcon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('wf-theme', dark ? 'dark' : 'light');
        }
        setTheme(darkMode);
        themeToggle.addEventListener('click', () => setTheme(!darkMode));

        // ============================================================
        // TOAST
        // ============================================================
        const toast = document.getElementById('toast');
        const toastTitle = document.getElementById('toastTitle');
        const toastMsg = document.getElementById('toastMsg');
        let toastTimeout;

        function showToast(title, msg, icon) {
            clearTimeout(toastTimeout);
            toastTitle.textContent = title || 'Success';
            toastMsg.textContent = msg || 'Action completed';
            const iconEl = toast.querySelector('.toast-icon i');
            if (icon) iconEl.className = icon;
            else iconEl.className = 'fas fa-check-circle';
            toast.classList.add('show');
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // ============================================================
        // LOGIN HANDLER
        // ============================================================
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showToast('Error', 'Please fill in all fields.', 'fas fa-exclamation-circle');
                document.getElementById('loginForm').style.animation = 'shake 0.4s ease';
                setTimeout(() => document.getElementById('loginForm').style.animation = '', 500);
                return;
            }

            const users = DB.getUsers();
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                DB.setSession({ userId: user.id });
                showToast('Welcome Back!', `Hello ${user.name}, redirecting to your dashboard...`, 'fas fa-check-circle');
                setTimeout(() => {
                    window.location.href = 'index.html#dashboard';
                }, 1000);
            } else {
                showToast('Login Failed', 'Invalid email or password. Please try again.', 'fas fa-exclamation-circle');
